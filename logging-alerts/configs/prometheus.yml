global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'self'
    static_configs:
      - targets: ['prometheus:9090']
  - job_name: 'blackbox'
    static_configs:
      - targets: ['nginx:80']

rule_files:
  - ../alert-rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']


