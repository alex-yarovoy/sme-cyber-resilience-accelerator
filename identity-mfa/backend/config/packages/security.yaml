security:
    enable_authenticator_manager: true

    password_hashers:
        App\Entity\User:
            algorithm: auto # Argon2id if available, then bcrypt
            time_cost: 4
            memory_cost: 64M
            migrate_from:
                - 'bcrypt'

    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]
        ROLE_SUPER_ADMIN: [ROLE_ADMIN]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(?:_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/auth/(login|refresh|mfa(/.*)?)$
            stateless: true
            lazy: true
            provider: app_user_provider

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/mfa, roles: PUBLIC_ACCESS }
        - { path: ^/api/webauthn/options, roles: PUBLIC_ACCESS }
        - { path: ^/api/webauthn/register$, roles: ROLE_USER }
        - { path: ^/api/webauthn/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }


