services:
  nginx:
    image: nginx:alpine
    ports:
      - "8880:80"
    volumes:
      - ./backend/public:/var/www/html/public
      - ./backend:/var/www/html
      - ./configs/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - php

  php:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/identity_mfa
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_secret_change_me
      # Set to 1 to run Doctrine fixtures on boot (optional; default skips for predictable restarts).
      - LOAD_LAB_FIXTURES=${LOAD_LAB_FIXTURES:-0}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:14
    environment:
      - POSTGRES_DB=identity_mfa
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5434:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

volumes:
  dbdata:


